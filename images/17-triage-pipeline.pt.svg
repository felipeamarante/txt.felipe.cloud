<svg viewBox="0 0 560 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pipeline de triagem de bugs em seis passos com roteamento por confianca" style="width:100%;height:auto;max-width:560px;display:block;margin:1.6rem auto">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
    .box{fill:#fff;stroke:#24292e;stroke-width:1.6}
    .soft{fill:#fff;stroke:#9aa0a6;stroke-width:1.3}
    .t{fill:#24292e;font-size:14px;font-weight:600}
    .s{fill:#57606a;font-size:12px}
    .n{fill:#57606a;font-size:12px;font-style:italic}
    .ar{stroke:#24292e;stroke-width:1.6;fill:none}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#24292e"/></marker></defs>

  <rect class="box" x="40" y="12" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="38" text-anchor="middle">Ticket no Jira</text>

  <rect class="box" x="40" y="82" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="108" text-anchor="middle">1 · Ler o ticket</text>

  <rect class="box" x="40" y="152" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="178" text-anchor="middle">2 · Está completo?</text>

  <rect class="box" x="40" y="222" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="248" text-anchor="middle">3 · Já foi corrigido?</text>

  <rect class="box" x="40" y="292" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="318" text-anchor="middle">4 · Buscar no código</text>

  <rect class="box" x="40" y="362" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="388" text-anchor="middle">5 · Diagnosticar + propor</text>

  <rect class="box" x="40" y="432" width="240" height="42" rx="6"/>
  <text class="t" x="160" y="458" text-anchor="middle">6 · Reportar no Jira</text>

  <line class="ar" x1="160" y1="54" x2="160" y2="80" marker-end="url(#a)"/>
  <line class="ar" x1="160" y1="124" x2="160" y2="150" marker-end="url(#a)"/>
  <line class="ar" x1="160" y1="194" x2="160" y2="220" marker-end="url(#a)"/>
  <line class="ar" x1="160" y1="264" x2="160" y2="290" marker-end="url(#a)"/>
  <line class="ar" x1="160" y1="334" x2="160" y2="360" marker-end="url(#a)"/>
  <line class="ar" x1="160" y1="404" x2="160" y2="430" marker-end="url(#a)"/>

  <rect class="soft" x="330" y="152" width="200" height="42" rx="6"/>
  <text class="s" x="430" y="178" text-anchor="middle">incompleto &#8594; devolver</text>
  <line class="ar" x1="280" y1="173" x2="330" y2="173" marker-end="url(#a)"/>

  <rect class="soft" x="330" y="222" width="200" height="42" rx="6"/>
  <text class="s" x="430" y="248" text-anchor="middle">já corrigido &#8594; fechar</text>
  <line class="ar" x1="280" y1="243" x2="330" y2="243" marker-end="url(#a)"/>

  <text class="n" x="280" y="510" text-anchor="middle">Uma nota de confiança (1&#8211;5) decide a ação</text>
</svg>
