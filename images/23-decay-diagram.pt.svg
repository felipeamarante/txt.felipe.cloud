<svg viewBox="0 0 620 322" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Base de conhecimento em tres camadas com um contrato e decaimento de confianca" style="width:100%;height:auto;max-width:600px;display:block;margin:1.6rem auto">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
    .box{fill:#fff;stroke:#24292e;stroke-width:1.6}
    .soft{fill:#fff;stroke:#9aa0a6;stroke-width:1.3}
    .t{fill:#24292e;font-size:14px;font-weight:600}
    .s{fill:#57606a;font-size:12px}
    .n{fill:#57606a;font-size:12px;font-style:italic}
    .mono{fill:#24292e;font-size:14px;font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .ar{stroke:#24292e;stroke-width:1.6;fill:none}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#24292e"/></marker></defs>

  <rect class="box" x="30" y="14" width="360" height="58" rx="6"/>
  <text class="mono" x="50" y="40" text-anchor="start">/sources</text>
  <text class="s" x="50" y="59" text-anchor="start">trilha imutável · nunca editada</text>

  <rect class="box" x="30" y="112" width="360" height="58" rx="6"/>
  <text class="mono" x="50" y="138" text-anchor="start">/wiki</text>
  <text class="s" x="50" y="157" text-anchor="start">páginas editáveis pelo agente</text>

  <rect class="box" x="448" y="14" width="142" height="156" rx="6"/>
  <text class="mono" x="519" y="78" text-anchor="middle">WIKI.md</text>
  <text class="s" x="519" y="100" text-anchor="middle">o contrato de</text>
  <text class="s" x="519" y="116" text-anchor="middle">manutenção</text>

  <line class="ar" x1="210" y1="72" x2="210" y2="110" marker-end="url(#a)"/>
  <text class="s" x="222" y="96" text-anchor="start">fatos citados se acumulam</text>

  <line class="ar" x1="448" y1="141" x2="392" y2="141" marker-end="url(#a)"/>
  <text class="n" x="419" y="131" text-anchor="middle">governa</text>

  <rect class="soft" x="40" y="206" width="100" height="40" rx="6"/>
  <text class="t" x="90" y="231" text-anchor="middle">alta</text>
  <rect class="soft" x="190" y="206" width="100" height="40" rx="6"/>
  <text class="t" x="240" y="231" text-anchor="middle">média</text>
  <rect class="soft" x="340" y="206" width="100" height="40" rx="6"/>
  <text class="t" x="390" y="231" text-anchor="middle">baixa</text>
  <line class="ar" x1="140" y1="226" x2="190" y2="226" marker-end="url(#a)"/>
  <line class="ar" x1="290" y1="226" x2="340" y2="226" marker-end="url(#a)"/>

  <text class="n" x="40" y="292" text-anchor="start">a confiança decai quando a página fica 21+ dias sem confirmação (rotina noturna)</text>
</svg>
