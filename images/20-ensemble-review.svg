<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ensemble review: diff fans out to reviewers, votes merge, a judge emits one comment" style="width:100%;height:auto;max-width:820px;display:block;margin:1.6rem auto">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
    .box{fill:#fff;stroke:#24292e;stroke-width:1.6}
    .t{fill:#24292e;font-size:15px;font-weight:600}
    .s{fill:#57606a;font-size:12px}
    .ar{stroke:#24292e;stroke-width:1.6;fill:none}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#24292e"/></marker></defs>

  <rect class="box" x="20" y="142" width="150" height="56" rx="6"/>
  <text class="t" x="95" y="175" text-anchor="middle">Pull request diff</text>

  <rect class="box" x="220" y="34" width="160" height="52" rx="6"/>
  <text class="t" x="300" y="56" text-anchor="middle">Reviewer 1</text>
  <text class="s" x="300" y="74" text-anchor="middle">independent</text>
  <rect class="box" x="220" y="144" width="160" height="52" rx="6"/>
  <text class="t" x="300" y="166" text-anchor="middle">Reviewer 2</text>
  <text class="s" x="300" y="184" text-anchor="middle">independent</text>
  <rect class="box" x="220" y="254" width="160" height="52" rx="6"/>
  <text class="t" x="300" y="276" text-anchor="middle">Reviewer 3</text>
  <text class="s" x="300" y="294" text-anchor="middle">independent</text>

  <rect class="box" x="440" y="142" width="140" height="56" rx="6"/>
  <text class="t" x="510" y="175" text-anchor="middle">Merge + vote</text>

  <rect class="box" x="640" y="128" width="180" height="84" rx="6"/>
  <text class="t" x="730" y="158" text-anchor="middle">Judge</text>
  <text class="s" x="730" y="178" text-anchor="middle">drops false positives</text>
  <text class="s" x="730" y="195" text-anchor="middle">ranks by confidence</text>

  <rect class="box" x="850" y="142" width="140" height="56" rx="6"/>
  <text class="t" x="920" y="167" text-anchor="middle">1 comment</text>
  <text class="s" x="920" y="185" text-anchor="middle">advisory only</text>

  <line class="ar" x1="170" y1="170" x2="220" y2="62" marker-end="url(#a)"/>
  <line class="ar" x1="170" y1="170" x2="220" y2="170" marker-end="url(#a)"/>
  <line class="ar" x1="170" y1="170" x2="220" y2="278" marker-end="url(#a)"/>

  <line class="ar" x1="380" y1="60" x2="440" y2="160" marker-end="url(#a)"/>
  <line class="ar" x1="380" y1="170" x2="440" y2="170" marker-end="url(#a)"/>
  <line class="ar" x1="380" y1="280" x2="440" y2="180" marker-end="url(#a)"/>

  <line class="ar" x1="580" y1="170" x2="640" y2="170" marker-end="url(#a)"/>
  <line class="ar" x1="820" y1="170" x2="850" y2="170" marker-end="url(#a)"/>
</svg>
