<svg viewBox="0 0 640 486" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Layered integration platform: gateway, Camel K routes, adapters, legacy backends" style="width:100%;height:auto;max-width:620px;display:block;margin:1.6rem auto">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
    .box{fill:#fff;stroke:#24292e;stroke-width:1.6}
    .k8s{fill:none;stroke:#9aa0a6;stroke-width:1.3;stroke-dasharray:5 4}
    .t{fill:#24292e;font-size:15px;font-weight:600}
    .s{fill:#57606a;font-size:12px}
    .n{fill:#57606a;font-size:12px;font-style:italic}
    .ar{stroke:#24292e;stroke-width:1.6;fill:none}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#24292e"/></marker></defs>

  <rect class="box" x="40" y="12" width="560" height="56" rx="6"/>
  <text class="t" x="320" y="36" text-anchor="middle">OEM partners</text>
  <text class="s" x="320" y="55" text-anchor="middle">different APIs, different auth, decades of point-to-point</text>

  <rect class="box" x="40" y="100" width="560" height="56" rx="6"/>
  <text class="t" x="320" y="124" text-anchor="middle">API Gateway</text>
  <text class="s" x="320" y="143" text-anchor="middle">one standardized HTTPS entry · multi-tenant auth</text>

  <rect class="k8s" x="28" y="180" width="584" height="76" rx="8"/>
  <text class="s" x="44" y="196" text-anchor="start">Kubernetes</text>
  <rect class="box" x="40" y="200" width="560" height="48" rx="6"/>
  <text class="t" x="320" y="221" text-anchor="middle">Apache Camel K routes</text>
  <text class="s" x="320" y="239" text-anchor="middle">transform · enrich · route · aggregate (declarative YAML)</text>

  <rect class="box" x="40" y="280" width="560" height="56" rx="6"/>
  <text class="t" x="320" y="304" text-anchor="middle">DMS adapter layer</text>
  <text class="s" x="320" y="323" text-anchor="middle">quarantines the legacy backends from the cloud side</text>

  <rect class="box" x="40" y="368" width="560" height="56" rx="6"/>
  <text class="t" x="320" y="392" text-anchor="middle">Legacy DMS backends</text>
  <text class="s" x="320" y="411" text-anchor="middle">SQL · DLLs · C#/.NET · Java · VB.NET</text>

  <line class="ar" x1="320" y1="68" x2="320" y2="98" marker-end="url(#a)"/>
  <line class="ar" x1="320" y1="156" x2="320" y2="186" marker-end="url(#a)"/>
  <line class="ar" x1="320" y1="256" x2="320" y2="278" marker-end="url(#a)"/>
  <line class="ar" x1="320" y1="336" x2="320" y2="366" marker-end="url(#a)"/>

  <text class="n" x="320" y="456" text-anchor="middle">old and new integrations coexist · strangler-fig migration</text>
</svg>
